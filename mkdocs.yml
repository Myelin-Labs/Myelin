      - Install the toolchain: getting-started/install.md
      - First run: getting-started/first-run.md
      - Anatomy of a Myelin CellTx: getting-started/anatomy.md
  - Concepts:
      - concepts/index.md
      - What is CKB?: concepts/what-is-ckb.md
      - What is CKB-VM?: concepts/what-is-ckb-vm.md
      - What is Myelin?: concepts/what-is-myelin.md
      - Semantic profiles: concepts/semantic-profiles.md
  - Architecture:
      - architecture/index.md
      - System overview: architecture/overview.md
      - CellScript & typed-cell metadata: architecture/cellscript.md
      - Execution pipeline: architecture/exec-pipeline.md
      - CellDAG scheduler: architecture/scheduler.md
      - State & data availability: architecture/state.md
      - Mempool & admission: architecture/mempool.md
      - Consensus engines: architecture/consensus.md
      - CKB-style projection: architecture/projection.md
  - L1 / L2 / off-chain interactions:
      - interactions/index.md
      - The three-layer model: interactions/l1-l2-offchain.md
      - Session lifecycle: interactions/session-flow.md
      - Court path: interactions/court-path.md
      - Data availability flow: interactions/da-flow.md
      - L1 submission flow: interactions/submission-flow.md
  - Tutorials:
      - tutorials/index.md
      - Your first CellTx: tutorials/first-celltx.md
      - Teeworlds end-to-end: tutorials/teeworlds-end-to-end.md
  - Patterns:
      - patterns/index.md
      - IoT metering: patterns/iot-metering.md
      - RFQ / market-maker settlement: patterns/rfq-settlement.md
      - Streaming payments: patterns/streaming-payments.md
  - Integrations:
      - integrations/index.md
      - Fiber Network bridge: integrations/fiber.md
  - Operations:
      - operations/index.md
      - CLI reference: operations/cli.md
      - Production gate: operations/production-gate.md
      - Concurrency plan: operations/concurrency-optimization-plan.md
      - Local CKB devnet smoke: operations/devnet-smoke.md
  - Security & claims:
      - security/index.md
      - Claim ladder: security/claim-ladder.md
      - Evidence paths: security/evidence-paths.md
      - Threat model: security/threat-model.md
  - Explanation:
      - explanation/index.md
      - Architecture decisions: explanation/architecture-decisions.md
      - FAQ: explanation/faq.md
  - Reference:
      - reference/index.md
      - Glossary: reference/glossary.md
      - Diagram gallery: reference/architecture-diagrams.md
  - Releases & positioning:
      - releases/index.md
      - Continuing the Teeworlds-on-CKB line: releases/teeworlds-lineage.md

validation:
  links:
    not_found: warn
    absolute_links: ignore
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: ignore