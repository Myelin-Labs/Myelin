site_name: Myelin
site_description: >-
  A CKB-isomorphic off-chain session runtime for finite Cell execution,
  deterministic CKB-VM verification, and CKB-style court projection.
site_author: Myelin contributors

docs_dir: docs

# We host at the project root for a user/org site (replace with `myelin` if
# serving under https://<org>.github.io/myelin/).
site_url: https://myelin-labs.github.io/Myelin/
repo_url: https://github.com/Myelin-Labs/Myelin
repo_name: Myelin-Labs/Myelin
edit_uri: edit/main/docs/

copyright: >-
  Copyright &copy; Myelin contributors. Documentation under MIT.
  Myelin is experimental protocol software — see Security & Claims.

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.smartsymbols
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search:
      lang: en
  - autorefs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Myelin-Labs/Myelin
      name: Myelin on GitHub
  generator: false
  feedback:
    title: Question? Open an issue
    url: https://github.com/Myelin-Labs/Myelin/issues/new
  alternativelink:
    - en/
  version:
    provider: mike
    default: stable

