      4. `/Users/arthur/RustroverProjects/CellFabric/docs/red-lines.md`（全读 — CellFabric 的
         "red lines"，跟 CellScript 0.14 scope audit 是同一种东西）
      5. `/Users/arthur/RustroverProjects/CellFabric/docs/cellscript-bridge.md`（全读 — bridge
         的 CellFabric 侧文档）
      6. `/Users/arthur/RustroverProjects/CellFabric/docs/development-roadmap.md`（理解 CellFabric
         自己的 roadmap，看 bridge 这一块写到哪里了）
      7. `/Users/arthur/RustroverProjects/CellFabric/src/cellscript_bridge.rs`（import 侧实现）
      8. `/Users/arthur/RustroverProjects/CellFabric/src/cellscript_amm.rs`（AMM-specific import，
