  - id: synthesize-comparison
    title: "综合比较与配合分析"
    assigned_to: coder
    depends_on: [cellscript-side, cellfabric-side]
    max_retries: 1
    verify_skip_reason: |
      最终综合报告；owner 会在 review 阶段人工核验。如果 owner 不满意会要求改写。
    prompt: |-
      你的任务：把两份侧写报告
      `/Users/arthur/RustroverProjects/Myelin/audits/cellscript-vs-cellfabric/CELLSCRIPT_SIDE.md`
      和
      `/Users/arthur/RustroverProjects/Myelin/audits/cellscript-vs-cellfabric/CELLFABRIC_SIDE.md`
      综合成一份**最终的比较 + 配合分析报告**。

      Owner 是 Myelin 项目的架构师，正在思考 Myelin 跟这两个项目的关系。本报告要回答
      三个问题（按重要性排序）：

      1. **CellScript 和 CellFabric 各自是什么、各自在哪一层、各自解决什么问题**
      2. **它们的核心区别是什么**（用结构化对比 + 叙述）
      3. **它们配合的可能性 / 现状 / 下一步**（重点：现有 bridge 的实际深度、缺什么、
         Myelin 该怎么参与）

      ## 必读输入

      - CELLSCRIPT_SIDE.md（worker A 的报告）
      - CELLFABRIC_SIDE.md（worker B 的报告）
      - 如果两份报告互相矛盾、或某条 claim 你无法从源文件验证，直接回去读源文件
        （CellScript 仓库 `/Users/arthur/RustroverProjects/CellScript`、
        CellFabric 仓库 `/Users/arthur/RustroverProjects/CellFabric`），
        不要复制粘贴 worker 的未验证 claim

      ## 不要做的事

      - 不要在最终报告里写"v1 / v2 / 改进版"这种版本叙事
      - 不要把现状的"缺口"包装成"机会"或者反过来；按现状写
      - 不要给 Myelin、CellScript、CellFabric 任何上游提建议（这是 owner 用的内部材料）
      - 不要做超过 600 行（如果写到 600 行还没讲完，砍细节；优先保留结构、对比、配合分析）
      - 不要复述两份侧写里讲过的细节；侧写是给 owner 看的"原始材料"，本报告是 owner
        拿出去给协作者/团队看的"成品"

      ## 推荐结构

      ```
      # CellScript vs CellFabric — 架构与配合分析

      ## TL;DR
      （3-5 段。先讲清"是什么"再讲"区别"，最后讲"配合"。每段不超过 5 行。）

      ## 1. 它们各自是什么
      ### 1.1 CellScript
      ### 1.2 CellFabric
      ### 1.3 同一棵 CKB Cell 树上的不同高度

      ## 2. 核心区别（结构化矩阵 + 段落叙述）
      ### 2.1 对比矩阵
      （一张表：维度 / CellScript / CellFabric / 谁更接近 L1）
      ### 2.2 区别不是"谁更好"，是"层不同"
      （叙述段。重点：编译时 vs 运行时、类型 vs 实例、单 cell vs cell 集合、
      on-chain 验证 vs off-chain 排序、CKB script ↔ ckb-tx bytes 两种产出。）

      ## 3. 现有配合面 — 它已经走通了多少
      ### 3.1 桥接的形状
      （一段：JSON envelope 级别的桥，不是 crate 级别的桥；CellScript
      故意不依赖 CellFabric crate 的设计选择）
      ### 3.2 已经能做什么
      （带 file:line 引用；从两份侧写里抽）
      ### 3.3 还缺什么 — 桥的接缝
      （带 file:line 引用。重点：CellScriptRuntimeBuilderCompiler 返回
      UnsupportedSettlementAction；通用 CellScript 路径没有 app settlement compiler。
      AMM 路径的完整闭环可以单独一段。）
      ### 3.4 谁负责 runtime builder
      （重要判断：现在这个洞是 owner 设计的"Myelin 角色"吗？读 Myelin 的
      /Users/arthur/RustroverProjects/Myelin/README.md 和 MYELIN_*.md 看 Myelin
      有没有在做 CellScript → CKB tx 的编译）

      ## 4. Myelin 跟两者的关系
      ### 4.1 Myelin ↔ CellScript（vendored，typed-cell target）
      ### 4.2 Myelin ↔ CellFabric（现状 — 有没有交叉？没有的话这是配合的机会窗口）
      ### 4.3 Myelin 能不能做 bridge 的 runtime builder
      （关键：Myelin 的 exec/、cellscript/ 已经在做 CellScript 的本地执行；
      这部分有没有可能变成 CellFabric 的 CellScriptRuntimeBuilder 实现？）

      ## 5. 配合的下一步（结构化提案）
      （不要写成"应该这样做"，写成"现在这条接缝长这样，把它关上需要 X / Y / Z"。）
      ### 5.1 立即能做的（不依赖任何新代码，只是把已有材料对齐）
      ### 5.2 短期可行的（新增少量代码，半年内能落地）
      ### 5.3 长期的（涉及协议变化）

      ## 6. 风险与不变项
      （两边的 red lines / scope boundaries 必须保留的不变项；
      不要在配合里碰它们。）
      ```

