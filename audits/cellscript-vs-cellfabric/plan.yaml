      - 每个结构性 claim 带 file:line 引用
      - 不要写"v1 / v2 / 改进版"
      - 不要在中文段落里突然插入英文整句（专有名词、crate 名、CLI flag 保留原文）
      - 不要在标题里用 emoji

      ## 停止条件

      报告写到 `/Users/arthur/RustroverProjects/Myelin/audits/cellscript-vs-cellfabric/COMPARISON_AND_COLLABORATION.md`，
      覆盖上面 6 节、每节不超过推荐行数、总长 < 600 行、所有结构性 claim 带 file:line 引用。
    output:
