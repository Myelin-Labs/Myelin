      12. `examples/cellscript_flow.rs` 和 `examples/cellscript_import.rs`（理解 dev 侧使用方式）

      ## 必做的发现

      在你的报告里，每条结论都要带 file:line 证据，不要凭印象。

      - **CellFabric 是什么**（用 3-5 句话讲清楚 layer、target、scope、phase）
      - **CellFabric 的核心模型**：IntentBody / SignedIntent、IntentDag、Bundle、SoftConfirmation、
        SettlementPlan、SettlementFinalityEvidence 之间的数据流
      - **CellFabric 的核心 invariant**（架构 / 安全 / reentrancy / double-spend 4 组）
      - **CellFabric 现有 CellScript 配合面的实现细节**：
        - `import_cellscript_intent_envelope` 走的是哪条路径
        - `CellScriptAppConflictPolicy` 做什么
        - `CellScriptRuntimeBuilderCompiler` 为什么返回 `UnsupportedSettlementAction`
          —— 这是 bridge 的关键缺口
        - AMM 路径为什么更完整：`AmmPoolBatchCompiler` 怎么工作；为什么 AMM 是
          "完整闭环" 而通用 CellScript 是 "import + 不 compile"
        - `http` feature 暴露的 `POST /cellscript/import` 和 `POST /cellscript/import/amm-swap`
      - **CellFabric 的 scope 边界**（red-lines.md）：CellFabric 拒绝做什么、为什么拒绝；
        跟 CellScript 0.14 scope audit 的"边界设计"是同一种思路
      - **CellFabric 的 Obyte 关系**：CellFabric 借鉴 Obyte 的什么、不借鉴什么；
        跟"借鉴 CellScript 编译产物"是不是同一种"借鉴不依赖"
      - **Myelin 的关系**（重要）：owner 当前 workspace `/Users/arthur/RustroverProjects/Myelin` 跟
        CellFabric 之间有没有任何交叉？CellFabric 的 docs/CellScript 关系里提没提 Myelin？
        （在 Myelin 仓库和 CellFabric 仓库两边都搜 "Myelin"）

