version: 1
plan:
  name: "CellScript vs CellFabric — 架构与配合分析"
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 5
  auto_reject_retries: 1

tasks:
  - id: cellscript-side
    title: "CellScript 侧深度调研"
    assigned_to: coder
    max_retries: 1
    verify_skip_reason: |
      调研报告，非生产代码改动；最终综合任务与 owner 都会复核。
    prompt: |-
      你的任务：从 CellScript 仓库（`/Users/arthur/RustroverProjects/CellScript`）的视角，调研它如何理解
      "自己 vs CellFabric"，以及它现有的 CellFabric 配合面。这是一份"侧写"报告，给 owner
      用来与 CellFabric 侧对照，不是给 CellScript 上游提的 PR。

      ## 必读文件（按顺序读，做笔记）

      1. `/Users/arthur/RustroverProjects/CellScript/README.md`（项目自述，重点读 target profiles、
         与 CKB 的关系、与 L2/上层的关系）
      2. `/Users/arthur/RustroverProjects/CellScript/AGENTS.md`（与本任务无直接关系，可跳过核心内容）
      3. `/Users/arthur/RustroverProjects/CellScript/src/lib.rs`（顶层 module map）
      4. CellScript 0.14 release notes / scope 文档（路径在 docs/releases/，先 `ls docs/releases/`）——
         重点看里面怎么界定 "Action Builder, CellFabric, CCC integration" 这些 scope 边界
      5. `/Users/arthur/RustroverProjects/CellScript/scripts/cellscript_cellfabric_bridge_smoke.sh`
         全文（理解 CellScript 端的桥接 smoke 走的是什么路径）
      6. `/Users/arthur/RustroverProjects/CellScript/scripts/cellscript_0_14_scope_audit.sh` 全文
         （理解 CellScript 自己如何 audit 自己的 scope 不越界）
      7. CellScript 端的 fabric-intent 输出代码：
         - `src/cli/commands.rs`（看 `cellfabric_intent_envelope_json` 附近的代码，约 10140-10280 行）
         - 搜 `cellfabric` / `fabric_intent` / `fabric-intent` 在 `src/` 下的所有出现
      8. `crates/cellscript-ckb-adapter/` 下的关键模块（理解 CellScript → CKB 怎么编译、metadata 怎么 emit）
      9. CellScript 端 `examples/` 下的一个 CKB 例子（看 `cellc action build --fabric-intent` 出来的 JSON 长什么样）

      ## 必做的发现

      在你的报告里，每条结论都要带 file:line 证据，不要凭印象。

      - **CellScript 是什么**（用 3-5 句话讲清楚 layer、target、scope）
      - **CellScript 跟 CKB 怎么对接**（type script / lock script / RISC-V 编译路径，metadata 怎么 emit）
      - **CellScript 跟 CellFabric 现有 bridge 的 CellScript 端实现细节**：
        - `cellc action build --fabric-intent` 走的是哪条 CLI 路径
        - envelope JSON schema `cellscript-cellfabric-intent-envelope-v0.20` 的关键字段
        - `bridge_boundary` 三个 flag 是什么语义
        - `cellfabric_intent_template` 包含什么
        - `cellscript_core_dependency: no-cell-fabric-rust-crate` 是不是设计上 CellScript
          故意不依赖 CellFabric crate？为什么这样选（这关系到能不能 cargo 互相 import）
      - **CellScript 自己怎么界定 scope 不越界**（看 0.14 release notes 和 scope audit）——
        哪些事是 CellScript 负责的，哪些事 CellScript 拒绝做
      - **CellScript 端的 runtime / settlement 路径**：CellScript 编译出来的 .elf 怎么变成 CKB
        transaction？metadata → cell deps 怎么映射？cellc 本身能直接 emit tx bytes 吗？
      - **Myelin 的关系**（重要，Myelin 仓库是 owner 的当前 workspace）：
        - Myelin vendors CellScript 在 `cellscript/` 子目录
        - Myelin 怎么用 CellScript 编译产物（看 `/Users/arthur/RustroverProjects/Myelin/AGENTS.md`
          和 `MYELIN_*.md` 里提到 CellScript 的地方）
        - Myelin 有没有在 `cellc` 上加 fabric-intent 输出？Myelin 的 typed-cell 目标 profile
          跟 CellFabric 怎么对应？

      ## 输出

      把报告写到 `/Users/arthur/RustroverProjects/Myelin/audits/cellscript-vs-cellfabric/CELLSCRIPT_SIDE.md`。

      结构建议（不强求，但请保持段落清晰、可被综合任务 grep 引用）：

      ```
      # CellScript 侧 — 自述与对 CellFabric 的现有配合面

      ## 1. CellScript 是什么（一段话）
      ## 2. CellScript → CKB 的编译路径
      ## 3. CellScript → CellFabric 的现有 bridge（CellScript 端）
         ### 3.1 入口：`cellc action build --fabric-intent`
         ### 3.2 envelope schema 关键字段
         ### 3.3 边界设计：为什么 no-cell-fabric-rust-crate
         ### 3.4 0.14 release 怎么 audit 这条边界
      ## 4. CellScript 的 scope 边界（什么它做、什么它不做）
      ## 5. CellScript 跟 Myelin 的关系
      ## 6. CellScript 的对外公共面（哪些 crate、哪些 binary、哪些 JSON schema）
      ## 7. 配合面观察（从 CellScript 视角看 CellFabric — 给 owner 综合用）
      ```

      每节都引用 file:line。如果发现 CellScript 文档或代码自相矛盾，直接指出。

      ## 不要做

      - 不要改任何代码
      - 不要给 CellScript 上游提建议（这是 owner 综合用的内部材料）
      - 不要试图运行 cargo build / test（除非某个 smoke 脚本对理解至关重要）
      - 不要在 report 里写"v1 / v2 / 改进版"这种版本叙事（CellScript 还在 alpha，所有交付就是单一份）
      - 不要把 CellScript 没做的事解读为 CellScript "想要"做某事——按现状写

      ## 停止条件

      报告写到指定路径、引用了所有关键 file:line、覆盖了上面 7 个必做的发现。
    output:
      path: /Users/arthur/RustroverProjects/Myelin/audits/cellscript-vs-cellfabric/CELLSCRIPT_SIDE.md
      min_lines: 200

  - id: cellfabric-side
    title: "CellFabric 侧深度调研"
    assigned_to: coder
    max_retries: 1
    verify_skip_reason: |
      调研报告，非生产代码改动；最终综合任务与 owner 都会复核。
    prompt: |-
      你的任务：从 CellFabric 仓库（`/Users/arthur/RustroverProjects/CellFabric`）的视角，调研它
      如何理解"自己 vs CellScript"，以及它现有的 CellScript 配合面。这是一份"侧写"报告，给 owner
      用来与 CellScript 侧对照。

      ## 必读文件（按顺序读，做笔记）

      1. `/Users/arthur/RustroverProjects/CellFabric/README.md`（重点读 System Model、
         Architecture Invariants、Current Boundaries、Module Map）
      2. `/Users/arthur/RustroverProjects/CellFabric/AGENTS.md`（与本任务无直接关系，可跳过）
      3. `/Users/arthur/RustroverProjects/CellFabric/docs/principles-tutorial.md`（全读，看 Core
