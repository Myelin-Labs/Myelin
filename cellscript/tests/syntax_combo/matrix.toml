# Matrix metadata for scripts/cellscript_syntax_combo_audit.py.
# The first runner version keeps generation deterministic and small, while this
# file records the axes that must stay covered as the generator grows.

[mode.quick]
budget = 64
min_cases = 15
min_accept = 8
min_reject = 7
required_origins = [
    "generated",
    "tests/syntax_combo/seeds/require-block-lifecycle.cell",
]
description = "Local smoke: deterministic generated cases plus regression seeds."

[mode.ci]
budget = 1000
min_cases = 37
min_accept = 22
min_reject = 15
required_origins = [
    "generated",
    "matrix:continuity/std-cell",
    "matrix:lifecycle/proof/control-flow",
    "matrix:lifecycle/proof/local-binding",
    "matrix:lock/source-qualifier",
    "matrix:receipt/metadata",
    "matrix:receipt/proof",
    "matrix:reject/metadata",
    "matrix:reject/proof-purity",
    "matrix:reject/stdlib-lifecycle",
    "matrix:stdlib-lifecycle/metadata",
    "matrix:stdlib-lifecycle/proof",
    "tests/syntax_combo/seeds/require-block-lifecycle.cell",
]
description = "PR gate: pairwise generated cases plus regression seeds."

[mode.deep]
budget = 5000
min_cases = 40
min_accept = 22
min_reject = 18
required_origins = [
    "generated",
    "matrix:continuity/std-cell",
    "matrix:deep/reject/proof-purity",
    "matrix:deep/reject/source-qualifier",
    "matrix:deep/reject/stdlib-namespace",
    "matrix:lifecycle/proof/control-flow",
    "matrix:lifecycle/proof/local-binding",
    "matrix:lock/source-qualifier",
    "matrix:receipt/metadata",
    "matrix:receipt/proof",
    "matrix:reject/metadata",
    "matrix:reject/proof-purity",
    "matrix:reject/stdlib-lifecycle",
    "matrix:stdlib-lifecycle/metadata",
    "matrix:stdlib-lifecycle/proof",
    "tests/syntax_combo/seeds/require-block-lifecycle.cell",
]
description = "Release audit: triplewise sample, mutations, and selected CKB acceptance."

[axes]
entry_kind = ["fn", "action", "lock"]
binding_source = ["ordinary", "cell_input", "named_output", "read", "protected", "witness", "lock_args", "read_ref"]
cell_kind = ["resource", "receipt", "receipt_output", "shared", "struct"]
lifecycle = ["none", "consume", "destroy", "stdlib_transfer", "stdlib_claim", "stdlib_settle"]
proof_syntax = ["require", "require_block", "assert", "branch_require", "helper_fn"]
continuity = ["explicit_require", "preserve", "same_type", "same_lock", "preserve_lock", "preserve_capacity", "conserved"]
control_flow = ["straight_line", "if", "nested_if", "match", "loop", "block_tail"]
data_shape = ["u64", "bool", "u32", "u128", "fixed_bytes", "tuple", "enum", "fixed_struct", "dynamic_field"]
collection = ["none", "vec_literal", "vec_helper", "unsupported_map", "cell_backed_attempt"]
profile = ["default", "ckb", "production"]
backend = ["parse", "fmt", "check", "metadata", "asm", "elf", "ckb_acceptance_subset"]

[required_oracles]
parse = true
formatter_roundtrip = true
type_effect = true
ir_metadata = true
codegen_assembly = true
compact_report = true

[governance]
release_matrix_report_key = "governance_release_matrix"
bug_class_report_key = "known_bug_classes"
description = "The runner must emit machine-readable grammar-governance release evidence and fail closed when required high-risk bug classes lose coverage."

required_bug_classes.quick = [
    "SCA-BUG-STD-LIFECYCLE-LOCKED-OUTPUT",
    "SCA-BUG-PRESERVE-TYPE-EQUIVALENCE",
    "SCA-BUG-REQUIRE-BLOCK-PURITY",
    "SCA-BUG-STDLIB-NAMESPACE-FAIL-CLOSED",
    "SCA-BUG-SOURCE-QUALIFIER-LINEARITY",
    "SCA-BUG-RECEIPT-CLAIM-CONTRACT",
    "SCA-BUG-LOCK-SOURCE-QUALIFIERS",
]

required_bug_classes.ci = [
    "SCA-BUG-STDLIB-ARGUMENT-VALIDATION",
    "SCA-BUG-METADATA-HELPER-VALIDATION",
    "SCA-BUG-RECEIPT-LIFECYCLE-OUTPUT",
    "SCA-BUG-FLOW-EDGE-UNDECLARED",
    "SCA-BUG-FLOW-CREATE-STATE-CONTRACT",
    "SCA-BUG-AGGREGATE-INVARIANT-CONTRACT",
]

required_bug_classes.deep = [
    "SCA-BUG-DEEP-HIDDEN-LIFECYCLE",
    "SCA-BUG-DEEP-READ-STDLIB-LIFECYCLE",
    "SCA-BUG-DEEP-UNKNOWN-STDLIB",
]
