name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix)"
        required: true

concurrency:
  group: cellscript-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CKB_SDK_RUST_REF: v5.1.0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check out ckb-sdk-rust path dependency
        run: |
          git clone --depth 1 --branch "$CKB_SDK_RUST_REF" \
            https://github.com/nervosnetwork/ckb-sdk-rust.git \
            "$GITHUB_WORKSPACE/../ckb-sdk-rust"
          git -C "$GITHUB_WORKSPACE/../ckb-sdk-rust" rev-parse --short HEAD

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Install Linux x86_64 musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build cellc
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release --bin cellc --target ${{ matrix.target }}

      - name: Package archive
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          ARCHIVE="cellscript-${VERSION}-${{ matrix.target }}.tar.gz"
          cp "target/${{ matrix.target }}/release/cellc" cellc
          tar czf "$ARCHIVE" cellc
          printf 'archive=%s\n' "$ARCHIVE" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        run: |
          sha256sum "${{ steps.package.outputs.archive }}" > SHA256SUMS.${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellscript-${{ matrix.target }}
          path: |
            *.tar.gz
            SHA256SUMS.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Merge SHA256SUMS
        run: |
          cat artifacts/*/SHA256SUMS.* > SHA256SUMS
          # Normalize filenames: strip per-target suffix
          sed -i 's/SHA256SUMS\.[a-z0-9_-]*  /  /' SHA256SUMS

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CellScript ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            scripts/install.sh
            artifacts/**/*.tar.gz
            SHA256SUMS
          body: |
            ## Installation

            ### One-line install (Global)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            ### One-line install (China mainland)

            If `raw.githubusercontent.com` is unreachable, use a GitHub proxy:

            ```bash
            curl -fsSL https://ghgo.xyz/https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            Or force a specific mirror for binary downloads:

            ```bash
            CELLSCRIPT_MIRROR=ghgo curl -fsSL https://ghgo.xyz/https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            Available mirrors: `ghgo` (ghgo.xyz), `ghproxy` (gh-proxy.com), `ghfast` (ghfast.top)

            ### Install specific version

            ```bash
            CELLSCRIPT_VERSION=${{ steps.version.outputs.version }} curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
            ```

            ### Alternative: cargo install

            ```bash
            cargo install cellscript
            ```

            ---

            ## Manual download

            | Platform | Archive |
            |----------|---------|
            | macOS (Apple Silicon) | `cellscript-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz` |
            | macOS (Intel) | `cellscript-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz` |
            | Linux (x86_64) | `cellscript-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux (ARM64) | `cellscript-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz` |

            Unpack and add to PATH:
            ```bash
            tar xzf cellscript-*.tar.gz
            mkdir -p ~/.cellscript/bin && mv cellc ~/.cellscript/bin/
            export PATH="$HOME/.cellscript/bin:$PATH"
            ```

            Verify: `cellc --version`

            ---

            ## Environment variables

            | Variable | Default | Description |
            |----------|---------|-------------|
            | `CELLSCRIPT_HOME` | `~/.cellscript` | Installation directory |
            | `CELLSCRIPT_VERSION` | latest | Install a specific version |
            | `CELLSCRIPT_MIRROR` | `auto` | Mirror: `auto`, `direct`, `ghgo`, `ghproxy`, `ghfast` |
            | `CELLSCRIPT_DRY_RUN` | `0` | Set to `1` to preview without installing |
