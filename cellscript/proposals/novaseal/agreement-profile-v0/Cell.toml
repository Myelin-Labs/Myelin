[package]
name = "novaseal-agreement-profile-v0"
version = "0.0.1"
authors = ["NovaSeal Design Team"]
description = "NovaSeal Agreement Profile v0 - CKB-native pre-agreed terminal contract skeleton"
license = "MIT"
repository = "https://github.com/CellScript-Labs/NovaSeal"
homepage = "https://github.com/CellScript-Labs/NovaSeal"
documentation = "README.md"
keywords = ["ckb", "novaseal", "agreement", "oracle-free"]
categories = ["protocol", "audit"]
cellscript_version = "0.16"
entry = "src/nova_agreement_type.cell"

source_roots = ["src"]
include = ["schemas/**/*", "proofs/**/*", "fixtures/**/*", "docs/**/*", "scripts/**/*", "harness/**/*"]
exclude = []

[dependencies]

[dev_dependencies]

[build.dependencies]

[policy]
production = true
deny_fail_closed = false
deny_ckb_runtime = false
deny_runtime_obligations = false

[[deploy.ckb.cell_deps]]
name = "cellscript_btc_bip340_verifier_riscv"
role = "runtime_verifier"
verifier_id = "btc.bip340.v0"
ipc_abi = "cellscript-btc-bip340-ipc-v0"
out_point = "0x6418f34fa16dc691febc1ce3870ff411c0bf6600f53ff27f57ca9723ae1d2c31:0"
dep_type = "code"
hash_type = "data1"
data_hash = "0x39322c6dd19574fed96547ca122924b3feb468281a6f4473ef83483403a7929c"
artifact_hash = "0xfb9093cd772873a992018cd2b357bf4e39884af5b48981c8fa65ebbf919f10c9"

[metadata]
protocol_family = "NovaSeal"
profile = "agreement-profile-v0"
conforms_to = "NovaSealCanonicalV0"
canonical_schema_hash = "0xe9a157d0211d63586f2e9334878f8354f87d4786f94aa9e5ea163fed5360aec6"
conformance_gate = "cellc certify --plugin novaseal-profile-v0"
certification_plugin = "novaseal-profile-v0"
certification_report = "target/cellscript-certification/novaseal-profile-v0.json"
status = "production-ready-source-package"
oracle_dependency = "none"
margin_call_dependency = "none"
btc_utxo_mirror = "not-implemented"
receipt_mode = "materialized-output-cell"
stateful_dispatcher = "src/nova_agreement_lifecycle_type.cell:nova_agreement_lifecycle"
deployment_pinning = "live-devnet-covered; public/shared attestation required for public/mainnet deployment"
wallet_signing_vectors = "target/novaseal-wallet-signing-vectors.json"
tcb_review_bundle = "target/novaseal-bip340-tcb-review.json"
production_gate = "target/novaseal-production-gates.json"
external_attestations = "../v0-mvp-skeleton/proofs/public_shared_cell_dep_attestation.json;../v0-mvp-skeleton/proofs/bip340_external_tcb_review_attestation.json"
