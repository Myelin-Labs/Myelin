[package]
name = "evolving-dob-profile-v1"
version = "1.0.0"
namespace = "dob"
authors = ["CellScript DOB Working Group"]
description = "DOB-EVO/1 production profile for CKB-backed evolving DOB state"
license = "MIT"
repository = "https://github.com/CellScript-Labs/dob-evo"
homepage = "https://github.com/CellScript-Labs/dob-evo"
documentation = "docs/PROFILE.md"
keywords = ["ckb", "dob", "spore", "state", "registry"]
categories = ["protocol", "asset", "audit"]
cellscript_version = "0.17.0"
entry = "src/evolving_dob_type.cell"

source_roots = ["src"]
include = ["schemas/**/*", "proofs/**/*", "fixtures/**/*", "docs/**/*", "scripts/**/*"]
exclude = []

[dependencies]

[dev_dependencies]

[build]
target = "riscv64-elf"
target_profile = "ckb"

[build.dependencies]

[policy]
production = true
deny_fail_closed = true
deny_ckb_runtime = false
deny_runtime_obligations = true

[metadata]
protocol_family = "DOB-EVO"
profile = "evolving-dob-profile-v1"
conforms_to = "DOB-EVO/1"
status = "production-ready-source-package"
base_protocol = "Spore DOB DNA+Pattern+Decoder"
state_model = "immutable-base-dob-plus-typed-successor-state-cell"
compatibility_policy = "no-backward-support"
legacy_version_support = false
minimum_supported_version = "1"
source_actions = "src/evolving_dob_type.cell:initialise_dob_state;src/evolving_dob_type.cell:evolve_dob_state;src/evolving_dob_type.cell:finalise_dob_state"
identity_policy = "ckb_type_id state line plus preserved spore_id and owner_lock"
registry_pressure_gate = "scripts/evolving_dob_registry_pressure.py"
production_gate = "docs/PRODUCTION_READINESS.md"
fixture_matrix = "fixtures"
invariant_matrix = "proofs/invariant_matrix.json"
